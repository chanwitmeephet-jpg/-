<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ใบเสนอซื้อ/จ้าง | แก้ไขใหม่</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #f97316;
      --accent: #8b5cf6;
      --bg: #02030d;
      --surface: rgba(8, 12, 32, 0.94);
      --surface-soft: rgba(16, 22, 54, 0.94);
      --border: rgba(139,92,246,0.2);
      --text: #eef2ff;
      --muted: #94a3b8;
      --success: #22c55e;
      --danger: #ef4444;
      --warning: #fbbf24;
      --shadow: 0 38px 96px rgba(0, 0, 0, 0.34);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Sarabun', sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top right, rgba(139,92,246,0.16), transparent 24%),
                  radial-gradient(circle at 14% 18%, rgba(249,115,22,0.18), transparent 20%),
                  linear-gradient(180deg, #04060f 0%, #02030b 100%);
      overflow-x: hidden;
    }
    body::before,
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: -1;
      opacity: 0.55;
      background-repeat: no-repeat;
      background-size: cover;
      animation: drift 18s ease-in-out infinite alternate;
    }
    body::before {
      background-image: radial-gradient(circle at 18% 18%, rgba(248,113,113,0.34), transparent 16%),
                        radial-gradient(circle at 78% 10%, rgba(139,92,246,0.28), transparent 18%);
    }
    body::after {
      background-image: radial-gradient(circle at 55% 30%, rgba(245,158,11,0.12), transparent 20%),
                        radial-gradient(circle at 26% 86%, rgba(59,130,246,0.14), transparent 14%),
                        linear-gradient(120deg, rgba(255,255,255,0.05), transparent 42%, rgba(255,255,255,0.02));
      filter: blur(10px);
    }
    .container {
      max-width: 940px;
      margin: 0 auto;
      padding: 34px 24px 48px;
      position: relative;
      z-index: 1;
    }
    .card {
      background: var(--surface);
      border-radius: 34px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      animation: cardLift 0.92s ease-out both;
    }
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(145deg, rgba(255,255,255,0.06), transparent 40%);
      pointer-events: none;
    }
    .hero {
      background: linear-gradient(135deg, rgba(251,146,60,0.96), rgba(139,92,246,0.95));
      color: #fff;
      padding: 36px 36px 30px;
      position: relative;
    }
    .hero::after {
      content: '';
      position: absolute;
      width: 280px;
      height: 280px;
      border-radius: 50%;
      top: -84px;
      right: -84px;
      background: rgba(255,255,255,0.12);
      filter: blur(24px);
    }
    .hero h1 { margin: 0; font-size: 34px; line-height: 1.03; }
    .hero p { margin: 14px 0 0; color: rgba(255,255,255,0.92); font-size: 15px; line-height: 1.75; }
    .content { padding: 34px 36px 38px; }
    .section-title { display: inline-flex; align-items: center; gap: 10px; margin-bottom: 18px; color: var(--accent); font-size: 13px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; }
    .grid { display: grid; gap: 18px; }
    .grid-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .field { display: flex; flex-direction: column; gap: 10px; }
    label { font-weight: 700; color: var(--muted); }
    .req { color: var(--danger); margin-left: 4px; }
    input, textarea, select {
      width: 100%; min-height: 48px;
      border-radius: 18px;
      border: 1px solid rgba(139,92,246,0.16);
      padding: 14px 16px;
      font-family: 'Sarabun', sans-serif;
      font-size: 15px;
      background: rgba(255,255,255,0.06);
      color: var(--text);
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }
    textarea { min-height: 120px; resize: vertical; }
    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: rgba(249,115,22,0.9);
      box-shadow: 0 0 0 6px rgba(249,115,22,0.14);
      background: rgba(255,255,255,0.12);
    }
    .button-row {
      display: flex;
      gap: 14px;
      justify-content: flex-end;
      margin-top: 28px;
      flex-wrap: wrap;
    }
    .btn {
      border: none;
      border-radius: 18px;
      padding: 16px 20px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.22s ease, box-shadow 0.22s ease;
      box-shadow: 0 20px 38px rgba(139,92,246,0.18);
      position: relative;
      overflow: hidden;
      color: #fff;
    }
    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle, rgba(255,255,255,0.18) 0%, transparent 55%);
      opacity: 0;
      transition: opacity 0.25s ease;
    }
    .btn:hover::before { opacity: 1; }
    .btn-primary { background: linear-gradient(135deg, #16a34a, #22c55e); }
    .btn-secondary { background: rgba(255,255,255,0.08); color: #eef2ff; border: 1px solid rgba(255,255,255,0.12); }
    .btn-danger { background: linear-gradient(135deg, #dc2626, #991b1b); }
    .btn:hover:not(:disabled) { transform: translateY(-2px); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .alert {
      padding: 20px 22px;
      border-radius: 20px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(59,130,246,0.14);
      color: var(--text);
      margin-bottom: 24px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
    }
    .toast {
      position: fixed;
      right: 22px;
      bottom: 22px;
      min-width: 280px;
      border-radius: 18px;
      padding: 16px 18px;
      display: none;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      z-index: 9999;
      color: #fff;
      box-shadow: 0 24px 52px rgba(15,23,42,0.18);
    }
    .toast.show { display: flex; animation: popIn 0.22s ease forwards; }
    .toast.success { background: linear-gradient(135deg, #16a34a, #22c55e); }
    .toast.error { background: linear-gradient(135deg, #dc2626, #991b1b); }
    .toast.warning { background: linear-gradient(135deg, #f59e0b, #d97706); }
    @keyframes popIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes drift { from { transform: translate(0, 0); } to { transform: translate(-28px, 18px); } }
    @keyframes cardLift { from { opacity: 0; transform: translateY(20px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
    @media(max-width: 860px) { .grid-2 { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="hero">
        <h1>⚠️ แก้ไขใหม่และส่งอีกรอบ</h1>
        <p>เอกสารของคุณไม่ได้ผ่านการอนุมัติ โปรดแก้ไขข้อมูลตามเหตุผลด้านล่างและส่งอีกครั้ง</p>
      </div>
      <div class="content">
        <div class="token-info">
          <div class="token-info-text">โทเค็นการร้องขอ:</div>
          <div class="token-chip" id="tokenValue">-</div>
        </div>

        <div id="rejectionBox" class="rejection-reason" style="display:none;">
          <strong>เหตุผลการไม่อนุมัติ:</strong>
          <p id="rejectionReason" style="margin: 8px 0 0;">-</p>
        </div>

        <div id="messageBox" class="alert">กำลังโหลดข้อมูล...</div>

        <div class="section-title">แก้ไขข้อมูล</div>
        <div class="grid grid-2">
          <div class="field">
            <label>เรื่อง <span class="req">*</span></label>
            <input id="subject" type="text" placeholder="ระบุเรื่องขอเสนอซื้อ/จ้าง">
          </div>
          <div class="field">
            <label>ข้าพเจ้า (ชื่อ-สกุล) <span class="req">*</span></label>
            <input id="requester_name" type="text" placeholder="ชื่อผู้เสนอ">
          </div>
          <div class="field">
            <label>อีเมล</label>
            <input id="email" type="email" placeholder="อีเมลติดต่อ">
          </div>
          <div class="field">
            <label>สังกัดหน่วยงาน <span class="req">*</span></label>
            <input id="department" type="text" placeholder="กองพัฒนานักศึกษา">
          </div>
          <div class="field">
            <label>ตำแหน่ง</label>
            <input id="position" type="text" placeholder="ตำแหน่ง">
          </div>
          <div class="field">
            <label>รายการที่ต้องการจัดซื้อ/จ้าง <span class="req">*</span></label>
            <input id="purchase_item" type="text" placeholder="ระบุชื่อรายการ">
          </div>
          <div class="field">
            <label>จำนวน (รายการ) <span class="req">*</span></label>
            <input id="quantity" type="number" min="1" placeholder="0">
          </div>
          <div class="field" style="grid-column: span 2;">
            <label>เหตุผลในการขอซื้อ/จ้าง <span class="req">*</span></label>
            <textarea id="purchase_reason" placeholder="ระบุเหตุผลและความจำเป็น"></textarea>
          </div>
          <div class="field">
            <label>วงเงินที่จะจัดซื้อ/จ้าง (บาท) <span class="req">*</span></label>
            <input id="budget" type="number" min="0" step="0.01" placeholder="0.00">
          </div>
          <div class="field">
            <label>จำนวนเงิน (ตัวอักษร)</label>
            <input id="budget_text" type="text" placeholder="เช่น หนึ่งหมื่นบาทถ้วน">
          </div>
          <div class="field" style="grid-column: span 2;">
            <label>รายละเอียดเพิ่มเติม</label>
            <textarea id="purchase_detail" placeholder="สเปค ขนาด รายละเอียดเพิ่มเติม"></textarea>
          </div>
        </div>

        <div class="button-row">
          <button class="btn btn-secondary" onclick="goBack()">ย้อนกลับ</button>
          <button class="btn btn-primary" id="submitBtn" onclick="resubmitForm()">ส่งใหม่อีกครั้ง</button>
        </div>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxZ1SEUPrRIEut4b8NkRKXFeH8PcJTO3MeCydwDZzn1RrkqHsQNCrqBO1jc_nDvSzvF8g/exec';
    const FORM_URL = 'https://chanwitmeephet-jpg.github.io/-/';
    const token = new URLSearchParams(window.location.search).get('token');

    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      toast.innerHTML = message;
      toast.className = `toast show ${type}`;
      clearTimeout(window.toastTimer);
      window.toastTimer = setTimeout(() => { toast.className = 'toast'; }, 3500);
    }

    function setMessageBox(message, isError = false) {
      const box = document.getElementById('messageBox');
      box.textContent = message;
      box.className = isError ? 'alert danger' : 'alert';
    }

    async function loadRejectedData() {
      if (!token) {
        setMessageBox('ไม่พบ token ใน URL', true);
        document.getElementById('submitBtn').disabled = true;
        return;
      }

      document.getElementById('tokenValue').textContent = token;

      try {
        const url = `${SCRIPT_URL}?api=check&token=${encodeURIComponent(token)}`;
        const response = await fetch(url);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        
        const result = await response.json();
        
        if (!result || !result.valid) {
          setMessageBox('Token ไม่ถูกต้องหรือหมดอายุแล้ว', true);
          document.getElementById('submitBtn').disabled = true;
          return;
        }

        if (result.status !== 'rejected') {
          setMessageBox('เอกสารนี้ไม่อยู่ในสถานะที่ต้องแก้ไข', true);
          document.getElementById('submitBtn').disabled = true;
          return;
        }

        // โหลดข้อมูลเดิม
        if (result.formData) {
          document.getElementById('subject').value = result.formData.subject || '';
          document.getElementById('requester_name').value = result.formData.requester_name || '';
          document.getElementById('email').value = result.formData.email || '';
          document.getElementById('department').value = result.formData.department || '';
          document.getElementById('position').value = result.formData.position || '';
          document.getElementById('purchase_item').value = result.formData.purchase_item || '';
          document.getElementById('quantity').value = result.formData.quantity || '';
          document.getElementById('purchase_reason').value = result.formData.purchase_reason || '';
          document.getElementById('budget').value = result.formData.budget || '';
          document.getElementById('budget_text').value = result.formData.budget_text || '';
          document.getElementById('purchase_detail').value = result.formData.purchase_detail || '';
        }

        // แสดงเหตุผลการไม่อนุมัติ
        const rejectionReason = result.formData?.rejection_reason;
        if (rejectionReason) {
          document.getElementById('rejectionBox').style.display = 'block';
          document.getElementById('rejectionReason').textContent = rejectionReason;
        }

        setMessageBox('ข้อมูลได้รับการโหลดแล้ว กรุณาแก้ไขและส่งใหม่อีกครั้ง');
      } catch (err) {
        setMessageBox(`เกิดข้อผิดพลาด: ${err.message}`, true);
        document.getElementById('submitBtn').disabled = true;
      }
    }

    function validateForm() {
      const required = [
        'subject', 'requester_name', 'department', 
        'purchase_item', 'purchase_reason', 'quantity', 'budget'
      ];
      for (const key of required) {
        const value = document.getElementById(key).value.trim();
        if (!value || value === '') {
          showToast(`กรุณากรอก ${key}`, 'error');
          return false;
        }
      }
      return true;
    }

    function getFormPayload() {
      return {
        action: 'resubmit_edit',
        token: token,
        form_url: FORM_URL,
        subject: document.getElementById('subject').value.trim(),
        requester_name: document.getElementById('requester_name').value.trim(),
        email: document.getElementById('email').value.trim(),
        department: document.getElementById('department').value.trim(),
        position: document.getElementById('position').value.trim(),
        purchase_item: document.getElementById('purchase_item').value.trim(),
        purchase_reason: document.getElementById('purchase_reason').value.trim(),
        quantity: document.getElementById('quantity').value.trim(),
        budget: document.getElementById('budget').value.trim(),
        budget_text: document.getElementById('budget_text').value.trim(),
        purchase_detail: document.getElementById('purchase_detail').value.trim(),
      };
    }

    async function postToGAS(payload) {
      try {
        const response = await fetch(SCRIPT_URL, {
          method: 'POST',
          mode: 'cors',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        if (!response.ok) throw new Error('Network error');
        return await response.json();
      } catch (err) {
        try {
          await fetch(SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify(payload)
          });
          return null;
        } catch {
          throw err;
        }
      }
    }

    async function resubmitForm() {
      if (!validateForm()) return;

      document.getElementById('submitBtn').disabled = true;
      showToast('กำลังส่งข้อมูล...', 'warning');

      const payload = getFormPayload();
      const result = await postToGAS(payload);

      if (!result || result.result !== 'success') {
        showToast('ไม่สามารถส่งข้อมูลได้ กรุณาลองใหม่', 'error');
        document.getElementById('submitBtn').disabled = false;
        return;
      }

      showToast('ส่งข้อมูลสำเร็จ', 'success');
      setTimeout(() => {
        window.location.href = FORM_URL;
      }, 2000);
    }

    function goBack() {
      if (confirm('ยืนยันการออกจากหน้านี้?')) {
        window.history.back();
      }
    }

    // โหลดข้อมูลเมื่อเพจเปิด
    window.addEventListener('DOMContentLoaded', loadRejectedData);
  </script>
</body>
</html>
