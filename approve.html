<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ใบเสนอซื้อ/จ้าง | อนุมัติ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #2f80ed;
      --accent: #8b5cf6;
      --bg: #070b1d;
      --surface: rgba(9, 14, 35, 0.96);
      --surface-soft: rgba(12, 20, 54, 0.96);
      --border: rgba(79, 70, 229, 0.22);
      --text: #ecf2ff;
      --muted: #94a3b8;
      --success: #22c55e;
      --danger: #ef4444;
      --warning: #f59e0b;
      --shadow: 0 40px 110px rgba(0, 0, 0, 0.35);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Sarabun', sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 18% 14%, rgba(79,70,229,0.18), transparent 18%),
                  radial-gradient(circle at 82% 12%, rgba(45,212,191,0.16), transparent 15%),
                  linear-gradient(180deg, #050814 0%, #020513 100%);
      overflow-x: hidden;
    }
    body::before,
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: -1;
      opacity: 0.55;
      background-repeat: no-repeat;
      background-size: cover;
      animation: nebulaMove 22s ease-in-out infinite alternate;
    }
    body::before {
      background-image: radial-gradient(circle at 20% 20%, rgba(139,92,246,0.32), transparent 18%),
                        radial-gradient(circle at 80% 8%, rgba(45,212,191,0.28), transparent 16%);
    }
    body::after {
      background-image: radial-gradient(circle at 50% 40%, rgba(239,68,68,0.14), transparent 18%),
                        radial-gradient(circle at 30% 82%, rgba(59,130,246,0.14), transparent 14%),
                        linear-gradient(135deg, rgba(255,255,255,0.05), transparent 45%, rgba(255,255,255,0.02));
      filter: blur(10px);
    }
    .container { max-width: 980px; margin: 0 auto; padding: 34px 24px 52px; position: relative; z-index: 1; }
    .card {
      position: relative;
      background: var(--surface);
      border-radius: 36px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      animation: cardLift 0.88s ease-out both;
    }
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(145deg, rgba(255,255,255,0.06), transparent 35%);
    }
    .banner {
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, rgba(56, 189, 248, 0.96), rgba(79, 70, 229, 0.96));
      color: #fff;
      padding: 42px 42px 34px;
    }
    .banner::after {
      content: '';
      position: absolute;
      width: 320px;
      height: 320px;
      border-radius: 50%;
      top: -96px;
      right: -96px;
      background: rgba(255,255,255,0.12);
      filter: blur(24px);
    }
    .banner h1 { margin: 0 0 10px; font-size: 36px; line-height: 1.03; letter-spacing: -0.03em; }
    .banner p { margin: 0; opacity: 0.95; line-height: 1.75; font-size: 15px; }
    .content { padding: 38px 42px 40px; }
    .section-title { margin-bottom: 24px; font-size: 12px; font-weight: 700; letter-spacing: 0.22em; color: var(--accent); text-transform: uppercase; }
    .info-block { display: grid; grid-template-columns: 1fr auto; gap: 20px; margin-bottom: 28px; align-items: center; }
    .info-block > div { background: rgba(9, 14, 35, 0.96); border: 1px solid rgba(79,70,229,0.22); border-radius: 24px; padding: 24px; }
    .token-chip {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      padding: 16px 20px;
      border-radius: 20px;
      font-size: 15px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: 0.01em;
      backdrop-filter: blur(16px);
    }
    .review-card {
      border: 1px solid rgba(79,70,229,0.18);
      border-radius: 28px;
      padding: 30px;
      background: rgba(9, 14, 34, 0.95);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05);
      animation: floatIn 1.2s ease-out both;
    }
    .review-row { display: grid; grid-template-columns: 180px 1fr; gap: 18px; padding: 18px 0; border-bottom: 1px solid rgba(255,255,255,0.08); }
    .review-row:last-child { border-bottom: none; }
    .review-label { color: var(--muted); font-weight: 700; }
    .review-value { color: var(--text); }
    .btn-group { display: flex; gap: 18px; flex-wrap: wrap; margin-top: 28px; }
    .btn {
      border: none;
      border-radius: 22px;
      min-width: 150px;
      padding: 16px 22px;
      font-size: 15px;
      cursor: pointer;
      font-weight: 700;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
      box-shadow: 0 20px 48px rgba(16, 25, 80, 0.28);
      position: relative;
      overflow: hidden;
      color: #fff;
    }
    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle, rgba(255,255,255,0.18) 0%, transparent 55%);
      opacity: 0;
      transition: opacity 0.25s ease;
    }
    .btn:hover::before { opacity: 1; }
    .btn-primary { background: linear-gradient(135deg, #22c55e, #16a34a); }
    .btn-secondary { background: linear-gradient(135deg, rgba(109,150,255,0.28), rgba(255,255,255,0.1)); color: #eef2ff; border: 1px solid rgba(109,150,255,0.24); }
    .btn-danger { background: linear-gradient(135deg, #ef4444, #b91c1c); }
    .btn:hover { transform: translateY(-3px); box-shadow: 0 24px 60px rgba(16,25,80,0.32); }
    .status-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 20px;
      border-radius: 999px;
      background: rgba(34,197,94,0.14);
      color: #8ef4b1;
      font-weight: 700;
      letter-spacing: 0.02em;
    }
    .alert {
      border-radius: 22px;
      padding: 22px 24px;
      background: rgba(9, 14, 34, 0.94);
      border: 1px solid rgba(79,70,229,0.18);
      margin-bottom: 26px;
      color: var(--text);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04);
    }
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      display: none;
      min-width: 300px;
      padding: 18px 22px;
      border-radius: 22px;
      color: #fff;
      z-index: 999;
      font-weight: 700;
      box-shadow: 0 24px 64px rgba(15,23,42,0.28);
    }
    .toast.show { display: block; animation: fadeInUp 0.24s ease forwards; }
    .toast.success { background: linear-gradient(135deg, #22c55e, #16a34a); }
    .toast.error { background: linear-gradient(135deg, #dc2626, #9b1c1c); }
    .toast.warning { background: linear-gradient(135deg, #f59e0b, #d97706); }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes nebulaMove { from { transform: translate(0, 0); } to { transform: translate(-32px, 20px); } }
    @keyframes cardLift { from { opacity: 0; transform: translateY(18px) scale(0.985); } to { opacity: 1; transform: translateY(0) scale(1); } }
    @keyframes floatIn { from { opacity: 0; transform: translateY(22px); } to { opacity: 1; transform: translateY(0); } }
    @media(max-width: 760px) { .info-block { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="banner">
        <h1>หน้าอนุมัติ</h1>
        <p>ผู้อำนวยการสามารถตรวจสอบเนื้อหาและส่งต่อไปยังหน้ากรอกข้อมูลเพิ่มเติมได้ทันที</p>
      </div>
      <div class="content">
        <div class="info-block">
          <div>
            <div class="section-title">TOKEN</div>
            <div id="tokenValue" class="token-chip">กำลังโหลด...</div>
          </div>
          <div>
            <div class="status-badge" id="statusBadge">รอโหลด</div>
          </div>
        </div>
        <div id="messageBox" class="alert">กำลังเรียกข้อมูลจากระบบ โปรดรอสักครู่...</div>
        <div class="section-title">ข้อมูลจากผู้เสนอ</div>
        <div id="reviewCard" class="review-card"></div>

        <div id="rejectionForm" style="display:none; margin-top: 26px;">
          <div class="section-title">เหตุผลการไม่อนุมัติ</div>
          <div style="display: flex; flex-direction: column; gap: 8px;">
            <textarea id="rejectionReason" placeholder="ระบุเหตุผลที่ไม่อนุมัติ เช่น ราคาสูง ข้อมูลไม่ครบ ฯลฯ" style="width: 100%; min-height: 110px; padding: 14px 16px; border-radius: 16px; border: 1px solid var(--border); font-family: 'Sarabun', sans-serif; font-size: 15px;"></textarea>
          </div>
        </div>

        <div class="btn-group">
          <button class="btn btn-primary" id="approveBtn" onclick="approveRequest()">อนุมัติ</button>
          <button class="btn btn-danger" id="rejectBtn" onclick="toggleRejectForm()">ไม่อนุมัติ</button>
          <button class="btn btn-primary" id="confirmRejectBtn" style="display:none;" onclick="rejectRequest()">ยืนยันการไม่อนุมัติ</button>
          <button class="btn btn-secondary" id="cancelRejectBtn" style="display:none;" onclick="toggleRejectForm()">ยกเลิก</button>
        </div>
      </div>
    </div>
  </div>
  <div id="toast" class="toast"></div>

  <script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxZ1SEUPrRIEut4b8NkRKXFeH8PcJTO3MeCydwDZzn1RrkqHsQNCrqBO1jc_nDvSzvF8g/exec';
    const FORM_URL = 'https://chanwitmeephet-jpg.github.io/-/';
    const token = new URLSearchParams(window.location.search).get('token');

    function showToast(message, type='success') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = `toast show ${type}`;
      clearTimeout(window.toastTimeout);
      window.toastTimeout = setTimeout(() => { toast.className = 'toast'; }, 3600);
    }

    function setError(message) {
      const box = document.getElementById('messageBox');
      box.textContent = message;
      box.style.borderColor = '#feb2b2';
      box.style.background = '#fff5f5';
      box.style.color = '#742a2a';
    }

    async function postAction(payload) {
      try {
        const response = await fetch(SCRIPT_URL, {
          method: 'POST',
          mode: 'cors',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        if (!response.ok) throw new Error('Network error');
        return await response.json();
      } catch (err) {
        console.warn(err);
        try {
          await fetch(SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify(payload)
          });
          showToast('Fallback no-cors ถูกใช้งานแล้ว', 'warning');
          return null;
        } catch {
          throw new Error('ไม่สามารถเชื่อมต่อ GAS ได้');
        }
      }
    }

    function renderReview(data) {
      const card = document.getElementById('reviewCard');
      if (!data) {
        card.innerHTML = '<p>ไม่พบข้อมูล</p>';
        return;
      }
      const fields = [
        ['เรื่อง', data.subject],
        ['ผู้เสนอ', data.requester_name],
        ['สังกัดหน่วยงาน', data.department],
        ['ตำแหน่ง', data.position],
        ['รายการ', data.purchase_item],
        ['เหตุผล', data.purchase_reason],
        ['จำนวน', data.quantity],
        ['วงเงิน', data.budget],
        ['จำนวนเงิน (ตัวอักษร)', data.budget_text],
        ['รายละเอียดเพิ่มเติม', data.purchase_detail]
      ];
      card.innerHTML = fields.map(([label, value]) =>
        `<div class="review-row"><div class="review-label">${label}</div><div class="review-value">${value || '-'}</div></div>`
      ).join('');
    }

    async function loadToken() {
      if (!token) {
        setError('ไม่พบ token ใน URL กรุณาเปิดลิงก์ approve.html?token=xxx');
        document.getElementById('approveBtn').disabled = true;
        document.getElementById('rejectBtn').disabled = true;
        return;
      }
      document.getElementById('tokenValue').textContent = token;
      try {
        const url = `${SCRIPT_URL}?api=check&token=${encodeURIComponent(token)}`;
        console.log('Fetching:', url);
        const res = await fetch(url);
        console.log('Response status:', res.status, res.statusText);
        if (!res.ok) {
          throw new Error(`HTTP ${res.status}`);
        }
        const text = await res.text();
        console.log('Response text:', text);
        const result = JSON.parse(text);
        console.log('Parsed result:', result);
        
        if (!result) {
          setError('ไม่สามารถโหลดข้อมูลได้ - ไม่มี response');
          return;
        }
        if (!result.valid) {
          const reason = result.reason || 'unknown';
          const message = reason === 'not_found'
            ? 'Token ไม่พบในระบบ' : reason === 'used'
            ? 'Token นี้ถูกใช้งานแล้ว' : reason === 'parse_error'
            ? 'ข้อมูล token เสียหาย' : `Token ไม่ถูกต้อง: ${reason}`;
          setError(message);
          showToast(message, 'warning');
          return;
        }
        document.getElementById('statusBadge').textContent = result.status || 'ไม่มีสถานะ';
        const msgBox = document.getElementById('messageBox');
        msgBox.textContent = `Token ผ่านการตรวจสอบแล้ว (สถานะ: ${result.status || 'unknown'})`;
        // reset any error styling
        msgBox.style.borderColor = '#d2d8e8';
        msgBox.style.background = '#f7f9ff';
        msgBox.style.color = '';
        renderReview(result.formData);
      } catch (err) {
        console.error('loadToken error:', err);
        setError(`เกิดข้อผิดพลาด: ${err.message}`);
        document.getElementById('approveBtn').disabled = true;
        document.getElementById('rejectBtn').disabled = true;
      }
    }

    async function testToken() {
      if (!token) {
        showToast('ไม่พบ token ใน URL', 'error');
        return;
      }
      document.getElementById('testBtn').disabled = true;
      document.getElementById('testBtn').textContent = 'กำลังทดสอบ...';
      try {
        const result = await postAction({ action: 'check_token', token });
        if (!result) {
          showToast('ไม่สามารถเชื่อมต่อระบบได้', 'error');
          return;
        }
        if (!result.valid) {
          const reason = result.reason || 'unknown';
          const message = reason === 'not_found'
            ? 'Token ไม่พบในระบบ' : reason === 'used'
            ? 'Token ถูกใช้งานไปแล้ว' : reason === 'parse_error'
            ? 'ข้อมูล token เสียหาย' : `Token ไม่ถูกต้อง: ${reason}`;
          setError(message);
          showToast(message, 'error');
          return;
        }
        document.getElementById('statusBadge').textContent = result.status || 'ไม่มีสถานะ';
        const statusLabel = result.status === 'approved' ? 'อนุมัติแล้ว' : result.status === 'pending' ? 'รออนุมัติ' : result.status;
        showToast(`Token ผ่านการทดสอบ (${statusLabel})`, 'success');
        loadToken();
      } finally {
        document.getElementById('testBtn').disabled = false;
        document.getElementById('testBtn').textContent = 'ทดสอบ Token';
      }
    }

    function setActionButtonsEnabled(enabled) {
      document.getElementById('approveBtn').disabled = !enabled;
      document.getElementById('rejectBtn').disabled = !enabled;
    }

    async function approveRequest() {
      setActionButtonsEnabled(false);
      const response = await postAction({ action: 'approve', token, form_url: FORM_URL });
      if (!response) {
        showToast('ไม่สามารถเชื่อมต่อระบบได้', 'error');
        setActionButtonsEnabled(true);
        return;
      }
      if (response.result !== 'success') {
        const message = response.message || 'ไม่สามารถอนุมัติได้ โปรดลองใหม่';
        showToast(message, 'error');
        setActionButtonsEnabled(true);
        return;
      }
      showToast('อนุมัติเรียบร้อย กำลังเปิดหน้าที่ 3...', 'success');
      document.getElementById('statusBadge').textContent = 'approved';
      setTimeout(() => {
        window.location.href = `complete.html?token=${encodeURIComponent(token)}&page=3`;
      }, 1500);
    }

    async function saveAndNotify() {
      const response = await postAction({ action: 'approve', token, form_url: FORM_URL });
      if (!response) {
        showToast('ไม่สามารถเชื่อมต่อระบบได้', 'error');
        return;
      }
      if (response.result !== 'success') {
        const message = response.message || 'ไม่สามารถบันทึกและแจ้ง LINE ได้ โปรดลองใหม่';
        showToast(message, 'error');
        return;
      }
      showToast('บันทึกและแจ้ง LINE เรียบร้อยแล้ว', 'success');
      document.getElementById('statusBadge').textContent = 'approved';
    }

    async function rejectRequest() {
      const rejectionReason = document.getElementById('rejectionReason').value.trim();
      if (!rejectionReason) {
        showToast('กรุณาระบุเหตุผลการไม่อนุมัติ', 'error');
        return;
      }

      if (!confirm('ยืนยันการไม่อนุมัติและส่งให้กลับไปแก้ไข?')) return;
      
      setActionButtonsEnabled(false);
      document.getElementById('confirmRejectBtn').disabled = true;
      
      const response = await postAction({ 
        action: 'reject', 
        token, 
        rejection_reason: rejectionReason,
        form_url: FORM_URL
      });
      
      if (!response) {
        showToast('ไม่สามารถบันทึกการไม่อนุมัติได้', 'error');
        setActionButtonsEnabled(true);
        document.getElementById('confirmRejectBtn').disabled = false;
        return;
      }

      if (response.result !== 'success') {
        showToast(response.message || 'เกิดข้อผิดพลาด', 'error');
        setActionButtonsEnabled(true);
        document.getElementById('confirmRejectBtn').disabled = false;
        return;
      }

      showToast('ส่งให้แก้ไขแล้ว', 'success');
      setTimeout(() => { 
        window.location.href = `edit.html?token=${encodeURIComponent(token)}`; 
      }, 1500);
    }

    function toggleRejectForm() {
      const form = document.getElementById('rejectionForm');
      const confirmBtn = document.getElementById('confirmRejectBtn');
      const cancelBtn = document.getElementById('cancelRejectBtn');
      const rejectBtn = document.getElementById('rejectBtn');

      if (form.style.display === 'none') {
        form.style.display = 'block';
        confirmBtn.style.display = 'inline-block';
        cancelBtn.style.display = 'inline-block';
        rejectBtn.style.display = 'none';
        document.getElementById('rejectionReason').focus();
      } else {
        form.style.display = 'none';
        confirmBtn.style.display = 'none';
        cancelBtn.style.display = 'none';
        rejectBtn.style.display = 'inline-block';
        document.getElementById('rejectionReason').value = '';
      }
    }

    loadToken();
  </script>
</body>
</html>
