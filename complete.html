<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ใบเสนอซื้อ/จ้าง | กรอกข้อมูลเพิ่มเติม</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #3b82f6;
      --accent: #8b5cf6;
      --bg: #050712;
      --surface: rgba(8, 12, 30, 0.94);
      --surface-soft: rgba(12, 18, 46, 0.94);
      --border: rgba(59,130,246,0.2);
      --text: #eef2ff;
      --muted: #94a3b8;
      --success: #22c55e;
      --danger: #ef4444;
      --shadow: 0 36px 90px rgba(0, 0, 0, 0.35);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Sarabun', sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 16% 16%, rgba(59,130,246,0.24), transparent 18%),
                  radial-gradient(circle at 84% 12%, rgba(139,92,246,0.18), transparent 16%),
                  linear-gradient(180deg, #040613 0%, #02030f 100%);
      overflow-x: hidden;
    }
    body::before,
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: -1;
      opacity: 0.55;
      background-repeat: no-repeat;
      background-size: cover;
      animation: drift 20s ease-in-out infinite alternate;
    }
    body::before {
      background-image: radial-gradient(circle at 20% 20%, rgba(59,130,246,0.34), transparent 18%),
                        radial-gradient(circle at 80% 10%, rgba(139,92,246,0.28), transparent 16%);
    }
    body::after {
      background-image: radial-gradient(circle at 50% 36%, rgba(16,185,129,0.14), transparent 20%),
                        radial-gradient(circle at 24% 84%, rgba(248,113,113,0.14), transparent 14%),
                        linear-gradient(125deg, rgba(255,255,255,0.05), transparent 42%, rgba(255,255,255,0.02));
      filter: blur(10px);
    }
    .container { max-width: 980px; margin: 0 auto; padding: 34px 24px 52px; position: relative; z-index: 1; }
    .card {
      background: var(--surface);
      border-radius: 36px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      animation: cardLift 0.9s ease-out both;
    }
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(145deg, rgba(255,255,255,0.06), transparent 35%);
      pointer-events: none;
    }
    .hero {
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, rgba(59,130,246,0.96), rgba(79,70,229,0.96));
      color: #fff;
      padding: 40px 40px 32px;
    }
    .hero::after {
      content: '';
      position: absolute;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      top: -90px;
      right: -90px;
      background: rgba(255,255,255,0.12);
      filter: blur(24px);
    }
    .hero h1 { margin: 0 0 10px; font-size: 34px; line-height: 1.03; }
    .hero p { margin: 14px 0 0; opacity: 0.92; font-size: 15px; line-height: 1.75; }
    .content { padding: 36px 38px 40px; }
    .section-title { margin-bottom: 20px; color: var(--accent); font-size: 13px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; }
    .grid { display: grid; gap: 20px; }
    .grid-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .field { display: flex; flex-direction: column; gap: 10px; }
    label { color: var(--muted); font-weight: 700; }
    .req { color: var(--danger); }
    input, textarea, select {
      width: 100%; padding: 16px 18px;
      border-radius: 18px;
      border: 1px solid rgba(59,130,246,0.18);
      background: rgba(255,255,255,0.06);
      font-size: 15px;
      color: var(--text);
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }
    textarea { min-height: 120px; resize: vertical; }
    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: rgba(59,130,246,0.9);
      box-shadow: 0 0 0 6px rgba(59,130,246,0.16);
      background: rgba(255,255,255,0.12);
    }
    .summary-panel {
      padding: 26px;
      border-radius: 28px;
      border: 1px solid rgba(59,130,246,0.14);
      background: rgba(255,255,255,0.05);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.06);
    }
    .summary-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      margin-bottom: 22px;
    }
    .summary-header h2 { margin: 0; font-size: 20px; }
    .status-pill {
      padding: 12px 18px;
      border-radius: 999px;
      background: rgba(22,163,74,0.12);
      color: #a7f3d0;
      font-weight: 700;
    }
    .summary-row { display: grid; grid-template-columns: 180px 1fr; gap: 14px; margin-bottom: 14px; }
    .summary-label { color: var(--muted); font-weight: 700; }
    .summary-value { color: var(--text); }
    .button-group { display: flex; justify-content: flex-end; gap: 16px; flex-wrap: wrap; margin-top: 28px; }
    .btn {
      border: none;
      cursor: pointer;
      border-radius: 18px;
      font-weight: 700;
      transition: transform 0.22s ease, box-shadow 0.22s ease;
      padding: 16px 22px;
      box-shadow: 0 20px 40px rgba(30,58,138,0.18);
      position: relative;
      overflow: hidden;
      color: #fff;
    }
    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle, rgba(255,255,255,0.18) 0%, transparent 55%);
      opacity: 0;
      transition: opacity 0.25s ease;
    }
    .btn:hover::before { opacity: 1; }
    .btn-primary { background: linear-gradient(135deg, #2563eb, #3b82f6); }
    .btn-secondary { background: rgba(255,255,255,0.08); color: #eef2ff; border: 1px solid rgba(255,255,255,0.12); }
    .btn-danger { background: linear-gradient(135deg, #dc2626, #b91c1c); }
    .btn:hover { transform: translateY(-2px); }
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      display: none;
      min-width: 280px;
      padding: 18px 22px;
      border-radius: 18px;
      color: #fff;
      z-index: 999;
      box-shadow: 0 24px 56px rgba(15,23,42,0.2);
      font-weight: 700;
    }
    .toast.show { display: block; }
    .alert {
      padding: 20px 22px;
      border-radius: 20px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(59,130,246,0.14);
      color: var(--text);
      margin-bottom: 26px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
    }
    @keyframes drift { from { transform: translate(0, 0); } to { transform: translate(-30px, 20px); } }
    @keyframes cardLift { from { opacity: 0; transform: translateY(18px) scale(0.985); } to { opacity: 1; transform: translateY(0) scale(1); } }
    @media(max-width: 760px) { .grid-2 { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="hero">
        <h1>หน้า 3 | กรอกข้อมูลเพิ่มเติม</h1>
        <p>กรอกข้อมูลเพิ่มเติมและยืนยันการบันทึกเมื่อ token ผ่านการอนุมัติแล้ว</p>
      </div>
      <div class="content">
        <div class="alert">โปรดตรวจสอบสถานะ token ก่อน เพื่อให้แน่ใจว่าได้รับอนุมัติแล้วเท่านั้น</div>
        <div class="section-title">สรุปข้อมูลจากหน้า 1</div>
        <div id="summaryPanel" class="summary-panel"></div>

        <div class="section-title">ข้อมูลเพิ่มเติม</div>
        <div class="grid grid-2">
          <div class="field">
            <label>ประเภทรายจ่าย <span class="req">*</span></label>
            <select id="expense_type">
              <option value="">เลือกประเภท</option>
              <option value="ค่าวัสดุ">ค่าวัสดุ</option>
              <option value="ค่าใช้สอย">ค่าใช้สอย</option>
              <option value="ค่าครุภัณฑ์">ค่าครุภัณฑ์</option>
              <option value="ค่าที่ดินและสิ่งก่อสร้าง">ค่าที่ดินและสิ่งก่อสร้าง</option>
            </select>
          </div>
          <div class="field">
            <label>การดำเนินการที่เห็นควร <span class="req">*</span></label>
            <select id="action_type">
              <option value="">เลือกการดำเนินการ</option>
              <option value="พิจารณาอนุมัติ">พิจารณาอนุมัติ</option>
              <option value="พิจารณาไม่อนุมัติ">พิจารณาไม่อนุมัติ</option>
              <option value="ส่งเข้ากระบวนการจัดซื้อ">ส่งเข้ากระบวนการจัดซื้อ</option>
            </select>
          </div>
          <div class="field" style="grid-column: span 2;">
            <label>หมายเหตุเพิ่มเติม</label>
            <textarea id="remarks" placeholder="เขียนหมายเหตุถ้าจำเป็น"></textarea>
          </div>
        </div>
        <div class="button-group">
          <button class="btn btn-secondary" onclick="window.location.href='index.html'">กลับสู่หน้าแรก</button>
          <button class="btn btn-primary" id="saveBtn" onclick="saveFinal()">บันทึกข้อมูลครบถ้วน</button>
        </div>
      </div>
    </div>
  </div>
  <div id="toast" class="toast"></div>

  <script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxZ1SEUPrRIEut4b8NkRKXFeH8PcJTO3MeCydwDZzn1RrkqHsQNCrqBO1jc_nDvSzvF8g/exec';
    const FORM_URL = 'https://chanwitmeephet-jpg.github.io/-/'
    const token = new URLSearchParams(window.location.search).get('token');
    let currentFormData = null;

    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.style.background = type === 'error' ? '#c53030' : '#2f855a';
      toast.className = 'toast show';
      clearTimeout(window.toastTimer);
      window.toastTimer = setTimeout(() => { toast.className = 'toast'; }, 3600);
    }

    async function postAction(body) {
      try {
        const response = await fetch(SCRIPT_URL, {
          method: 'POST',
          mode: 'cors',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        if (!response.ok) throw new Error('Network error');
        return await response.json();
      } catch (err) {
        console.warn(err);
        try {
          await fetch(SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify(body)
          });
          showToast('Fallback no-cors ถูกใช้งานแล้ว', 'warning');
          return null;
        } catch {
          throw new Error('ไม่สามารถเชื่อมต่อ GAS ได้');
        }
      }
    }

    function renderSummary(data) {
      if (!data) return;
      currentFormData = data;
      const panel = document.getElementById('summaryPanel');
      panel.innerHTML = `
        <div class="summary-header">
          <h2>ข้อมูลที่ตรวจสอบแล้ว</h2>
          <div class="status-pill">${data.status || 'unknown'}</div>
        </div>
        <div class="summary-row"><div class="summary-label">เรื่อง</div><div class="summary-value">${data.subject || '-'}</div></div>
        <div class="summary-row"><div class="summary-label">ผู้เสนอ</div><div class="summary-value">${data.requester_name || '-'}</div></div>
        <div class="summary-row"><div class="summary-label">สังกัด</div><div class="summary-value">${data.department || '-'}</div></div>
        <div class="summary-row"><div class="summary-label">รายการ</div><div class="summary-value">${data.purchase_item || '-'}</div></div>
        <div class="summary-row"><div class="summary-label">เหตุผล</div><div class="summary-value">${data.purchase_reason || '-'}</div></div>
        <div class="summary-row"><div class="summary-label">วงเงิน</div><div class="summary-value">${data.budget || '-'} บาท</div></div>
      `;
    }

    async function verifyToken() {
      if (!token) {
        showToast('ไม่พบ token ใน URL แต่ยังสามารถกรอกข้อมูลได้', 'warning');
        return;
      }
      try {
        const url = `${SCRIPT_URL}?api=check&token=${encodeURIComponent(token)}&page=3`;
        console.log('[P3] Fetching token from:', url);
        const res = await fetch(url);
        console.log('[P3] Response status:', res.status, res.statusText);
        if (!res.ok) throw new Error(`HTTP ${res.status}: ${res.statusText}`);
        const text = await res.text();
        console.log('[P3] Response text length:', text.length, 'text:', text);
        const result = JSON.parse(text);
        console.log('[P3] Parsed result:', JSON.stringify(result));
        
        if (!result) {
          console.error('[P3] No result object');
          showToast('ไม่ได้รับข้อมูลจากเซิร์ฟเวอร์ แต่ยังสามารถกรอกข้อมูลได้', 'warning');
          return;
        }
        if (!result.valid) {
          console.error('[P3] Token not valid, reason:', result.reason, 'status:', result.status);
          const reasons = { 'no_token': 'ไม่มี token', 'not_found': 'Token ไม่พบ', 'not_approved': 'ยังไม่อนุมัติ', 'used': 'ใช้แล้ว' };
          const msg = reasons[result.reason] || ('Token ไม่ถูกต้อง: ' + result.reason);
          showToast(msg + ' แต่ยังสามารถกรอกข้อมูลได้', 'warning');
          return;
        }
        if (result.status !== 'approved') {
          console.error('[P3] Status not approved, current status:', result.status);
          showToast('ข้อมูลยังไม่ได้อนุมัติ (สถานะ: ' + result.status + ') แต่ยังสามารถกรอกข้อมูลได้', 'warning');
          return;
        }
        console.log('[P3] Token verified, loading form data');
        renderSummary(result.formData);
        showToast('Token ผ่านการตรวจสอบแล้ว', 'success');
      } catch (err) {
        console.error('[P3] verifyToken error:', err.toString(), err.stack);
        showToast('เกิดข้อผิดพลาดในการตรวจสอบ token แต่ยังสามารถกรอกข้อมูลได้', 'warning');
      }
    }

    async function saveFinal() {
      if (!currentFormData) {
        showToast('ยังไม่มีข้อมูลสำหรับบันทึก', 'error');
        return;
      }
      const expenseType = document.getElementById('expense_type').value;
      const actionType = document.getElementById('action_type').value;
      const remarks = document.getElementById('remarks').value.trim();
      if (!expenseType || !actionType) {
        showToast('กรุณาเลือกประเภทรายจ่ายและการดำเนินการ', 'error');
        return;
      }
      
      document.getElementById('saveBtn').disabled = true;
      
      const response = await postAction({
        action: 'final_save',
        token,
        expense_type: expenseType,
        action_type: actionType,
        remarks,
        subject: currentFormData.subject,
        requester_name: currentFormData.requester_name,
        department: currentFormData.department,
        position: currentFormData.position,
        purchase_item: currentFormData.purchase_item,
        purchase_reason: currentFormData.purchase_reason,
        quantity: currentFormData.quantity,
        budget: currentFormData.budget,
        budget_text: currentFormData.budget_text,
        purchase_detail: currentFormData.purchase_detail
      });
      
      if (!response || response.result !== 'success') {
        showToast('ไม่สามารถบันทึกข้อมูลได้', 'error');
        document.getElementById('saveBtn').disabled = false;
        return;
      }
      
      // Lock หน้า - ซ่อนปุ่มและ disable ฟิลด์
      showToast('บันทึกข้อมูลสำเร็จแล้ว', 'success');
      lockPage();
    }

    function lockPage() {
      // แสดงข้อความสำเร็จ
      const alert = document.querySelector('.alert');
      alert.innerHTML = '✅ <strong>ทำการเสร็จแล้ว</strong> - ไม่สามารถแก้ไขหรือส่งข้อมูลอีกครั้งได้ โปรดติดต่อหน่วยงานที่เกี่ยวข้องหากต้องการแก้ไข';
      alert.style.background = '#f0fff4';
      alert.style.borderColor = '#9ae6b4';
      alert.style.color = '#22543d';

      // Disable ปุ่ม save
      document.getElementById('saveBtn').style.display = 'none';

      // Disable ฟิลด์
      document.getElementById('expense_type').disabled = true;
      document.getElementById('action_type').disabled = true;
      document.getElementById('remarks').disabled = true;
    }

    verifyToken();
  </script>
</body>
</html>
